<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aliester - Gestion Personal</title>
  <link rel="icon" type="image/jpeg" href="Diseño sin título.png">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>
  <!-- Auth Loading -->
  <div class="auth-loading" id="auth-loading">
    <div class="auth-loading-spinner"></div>
    <span class="auth-loading-text">Cargando...</span>
  </div>

  <!-- Auth Screen (hidden by default, shown when not authenticated) -->
  <div class="auth-screen" id="auth-screen" style="display:none"></div>

  <div class="app" style="display:none">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="#/" class="sidebar-logo">
          <div class="sidebar-logo-icon"><img src="Diseño sin título.png" alt="Aliester" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-md)"></div>
          <span class="sidebar-logo-text">Aliester</span>
        </a>
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Colapsar sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <a href="#/" class="sidebar-item active" data-route="/">
            <span class="sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </span>
            <span class="sidebar-item-text">Dashboard</span>
          </a>
          <a href="#/asistente" class="sidebar-item" data-route="/asistente">
            <span class="sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
            </span>
            <span class="sidebar-item-text">Asistente</span>
            <span class="sidebar-item-badge" style="background:var(--success);color:white">IA</span>
          </a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Mis Modulos</div>
          <a href="#/cuentas" class="sidebar-item" data-route="/cuentas">
            <span class="sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </span>
            <span class="sidebar-item-text">Cuentas</span>
          </a>
          <a href="#/finanzas" class="sidebar-item" data-route="/finanzas">
            <span class="sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </span>
            <span class="sidebar-item-text">Finanzas</span>
          </a>
          <a href="#/proyectos" class="sidebar-item" data-route="/proyectos">
            <span class="sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            </span>
            <span class="sidebar-item-text">Proyectos</span>
          </a>
          <a href="#/calendario" class="sidebar-item" data-route="/calendario">
            <span class="sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </span>
            <span class="sidebar-item-text">Calendario</span>
          </a>
          <a href="#/notas" class="sidebar-item" data-route="/notas">
            <span class="sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </span>
            <span class="sidebar-item-text">Notas</span>
          </a>
          <a href="#/suscripciones" class="sidebar-item" data-route="/suscripciones">
            <span class="sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </span>
            <span class="sidebar-item-text">Suscripciones</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer" id="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar">--</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">Cargando...</div>
            <div class="sidebar-user-role">&nbsp;</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Navbar -->
      <header class="navbar">
        <div class="navbar-breadcrumb" id="breadcrumb">
          <a href="#/" class="navbar-breadcrumb-link">Aliester</a>
          <span class="navbar-breadcrumb-sep">/</span>
          <span class="navbar-breadcrumb-current">Dashboard</span>
        </div>

        <div class="navbar-spacer"></div>

        <div class="navbar-actions">
          <button class="navbar-btn" id="btn-notifications" title="Notificaciones" onclick="toggleNotifications()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </button>
          <div class="navbar-settings-wrapper">
            <button class="navbar-btn" id="btn-settings" title="Configuracion" onclick="toggleSettings()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <div class="settings-dropdown" id="settings-dropdown">
              <div class="settings-dropdown-title">Ajustes</div>
              <div class="settings-option">
                <span class="settings-option-label">Modo oscuro</span>
                <label class="toggle">
                  <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode(this.checked)">
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="settings-option">
                <span class="settings-option-label">Moneda</span>
                <select class="settings-select" id="currency-select" onchange="changeCurrency(this.value)">
                  <option value="MXN">MXN</option>
                  <option value="USD">USD</option>
                  <option value="EUR">EUR</option>
                </select>
              </div>
              <div class="settings-option">
                <span class="settings-option-label">Notificaciones</span>
                <label class="toggle">
                  <input type="checkbox" id="notifications-toggle" checked onchange="toggleNotificationsFromSettings(this.checked)">
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="settings-option">
                <span class="settings-option-label">Tamano de fuente</span>
                <select class="settings-select" id="font-size-select" onchange="changeFontSize(this.value)">
                  <option value="small">Pequeno</option>
                  <option value="normal" selected>Normal</option>
                  <option value="large">Grande</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- Content -->
      <div class="content" id="app-content">
        <!-- Views will be rendered here -->
      </div>
    </main>

    <!-- Ali Chatbot Sidebar -->
    <aside class="ali-sidebar" id="ali-sidebar">
      <div class="ali-sidebar-inner">
        <div class="ali-header">
          <div class="ali-header-left">
            <div class="ali-header-avatar">A</div>
            <div class="ali-header-info">
              <div class="ali-header-name">Ali</div>
              <div class="ali-header-status">En linea</div>
            </div>
          </div>
          <button class="ali-close" onclick="aliClose()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="ali-messages" id="ali-messages"></div>
        <div class="ali-input-area">
          <input type="text" class="ali-input" id="ali-input" placeholder="Escribe tu pregunta..." autocomplete="off">
          <button class="ali-send" id="ali-send" onclick="aliSendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Ali FAB (outside .app for fixed positioning) -->
  <button class="ali-fab" id="ali-fab" onclick="aliToggle()" title="Ali - Asistente IA">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
  </button>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Modal</h3>
        <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="js/views/auth.js"></script>
  <script src="js/data/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/views/cuentas.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/finanzas.js"></script>
  <script src="js/views/proyectos.js"></script>
  <script src="js/views/calendario.js"></script>
  <script src="js/views/notas.js"></script>
  <script src="js/views/suscripciones.js"></script>
  <script src="js/views/asistente.js"></script>
  <script src="js/views/chatbot.js"></script>
  <script type="module" src="js/services/insforge.js"></script>
</body>
</html>
